name: Release bump (major.minor.build) + PR (release -> main)

on:
  pull_request:
    types: [closed]
    branches: [release]

jobs:
  bump_and_pr:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest   # ← Runner gratuito do GitHub
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout release
        uses: actions/checkout@v4
        with:
          ref: release
          fetch-depth: 0

      - name: Ensure Node
        run: |
          node -v

      - name: Bump version
        id: bump
        run: |
          node .github/scripts/bump-version.js

      - name: Commit & push version bump to release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add VERSION.json

          if git diff --cached --quiet; then
            echo "Sem alterações em VERSION.json (nada para commitar)."
          else
            VERSION="${{ steps.bump.outputs.version }}"
            git commit -m "chore(release): bump version to v$VERSION"
            git push origin release
          fi

  Git-verify-main:
    needs: bump_and_pr
    runs-on: ubuntu-latest   # ← Runner gratuito do GitHub
    permissions:
      contents: read

    steps:
      - name: Ensure GitHub CLI (gh)
        run: |
          if ! command -v gh &> /dev/null; then
            echo "gh não encontrado no runner. Instale GitHub CLI no self-hosted runner."
            exit 1
          fi
          gh --version

  Open-PR:
    needs: Git-verify-main
    runs-on: ubuntu-latest   # ← Runner gratuito do GitHub
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Create PR if missing (release -> main)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          PR_NUMBER=$(gh pr list --state open --head "release" --base "main" --json number --jq '.[0].number' 2>/dev/null || echo "")
          
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "PR já existe (#$PR_NUMBER). Nada a fazer."
            exit 0
          fi

          gh pr create \
            --base "main" \
            --head "release" \
            --title "release: promote release -> main (v$VERSION)" \
            --body "Promoção automática release -> main. Versão: v$VERSION"

          NEW_PR=$(gh pr list --state open --head "release" --base "main" --json number --jq '.[0].number')
          echo "Criado PR #$NEW_PR"
          
          # Tentar adicionar labels se existirem
          gh pr edit "$NEW_PR" --add-label "automated" 2>/dev/null || true
          gh pr edit "$NEW_PR" --add-label "release" 2>/dev/null || true
          echo "Labels adicionadas ao PR #$NEW_PR"