name: Auto PR (feature -> develop)

on:
  push:
    branches:
      - "feature/**"

jobs:
  Warm-up:
    runs-on: ubuntu-latest   # ← Runner gratuito do GitHub
    permissions:
      contents: read

    steps:
      - name: Ensure or install GitHub CLI (gh)
        run: |
          if command -v gh >/dev/null 2>&1; then
            echo "gh já instalado"
            gh --version
            exit 0
          fi
          echo "gh não encontrado — tentando instalar via apt..."
          set -eux
          sudo apt update
          sudo apt install -y curl apt-transport-https gnupg
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install -y gh
          gh --version

  Tests:
    needs: Warm-up
    runs-on: ubuntu-latest   # ← Runner gratuito do GitHub
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore IoC.sln

      - name: Validate tests
        run: dotnet test IoC.sln --configuration Release --verbosity normal

  Git-verify-feature:
    needs: Tests
    runs-on: ubuntu-latest   # ← Runner gratuito do GitHub
    permissions:
      contents: read

    steps:
      - name: Ensure GitHub CLI (gh)
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            echo "gh não encontrado no runner. Instale GitHub CLI no self-hosted runner."
            exit 1
          fi
          gh --version

  Open-PR:
    needs: Git-verify-feature
    runs-on: ubuntu-latest   # ← Runner gratuito do GitHub
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create PR if missing (feature -> develop)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          echo "Branch atual: $BRANCH"

          PR_NUMBER=$(gh pr list --state open --head "$BRANCH" --base "develop" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "PR já existe (#$PR_NUMBER). Nada a fazer."
            exit 0
          fi

          gh pr create \
            --base "develop" \
            --head "$BRANCH" \
            --title "feat: auto PR $BRANCH -> develop" \
            --body "PR auto-criado via GitHub Actions (feature -> develop)."

          NEW_PR=$(gh pr list --state open --head "$BRANCH" --base "develop" --json number --jq '.[0].number')
          echo "Criado PR #$NEW_PR"

          gh pr edit "$NEW_PR" --add-label "automated" 2>/dev/null || true
          gh pr edit "$NEW_PR" --add-label "feature" 2>/dev/null || true