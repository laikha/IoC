name: Auto PR (develop -> release)

on:
  pull_request:
    types: [closed]
    branches: [develop]

jobs:
  open_pr:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest   # ← Runner gratuito do GitHub
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore IoC.sln

      - name: SonarValidator
        run: |
          echo "Running SonarValidator: validating tests and coverage"
          dotnet test IoC.sln --configuration Release --no-restore --collect:"XPlat Code Coverage"
          COVERAGE_FILE=$(find . -path '*/TestResults/*/coverage.cobertura.xml' | head -n 1)
          if [ -z "$COVERAGE_FILE" ]; then
            echo "Arquivo de cobertura não encontrado. SonarValidator falhou."
            exit 1
          fi
          echo "Coverage file found: $COVERAGE_FILE"
          COVERAGE=$(grep -o 'line-rate="[^"]*"' "$COVERAGE_FILE" | head -n 1 | cut -d'"' -f2)
          if [ -z "$COVERAGE" ]; then
            echo "Não foi possível extrair a cobertura de linha do arquivo."
            exit 1
          fi
          echo "Coverage line rate: $COVERAGE"
          REQUIRED_THRESHOLD=0.80
          if awk "BEGIN {exit !($COVERAGE >= REQUIRED_THRESHOLD)}"; then
            echo "Cobertura aceita ($COVERAGE >= $REQUIRED_THRESHOLD)."
          else
            echo "Cobertura abaixo do mínimo exigido ($COVERAGE < $REQUIRED_THRESHOLD)."
            exit 1
          fi

      - name: Ensure GitHub CLI (gh)
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            echo "gh não encontrado no runner. Instale GitHub CLI no self-hosted runner."
            exit 1
          fi
          gh --version

      - name: Create PR if missing (develop -> release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --state open --head "develop" --base "release" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            echo "PR já existe (#$PR_NUMBER). Nada a fazer."
            exit 0
          fi

          gh pr create \
            --base "release" \
            --head "develop" \
            --title "chore: promote develop -> release" \
            --body "Promoção automática develop -> release (merge detectado em develop)."

          NEW_PR=$(gh pr list --state open --head "develop" --base "release" --json number --jq '.[0].number')
          echo "Criado PR #$NEW_PR"

          gh pr edit "$NEW_PR" --add-label "automated" 2>/dev/null || true
          gh pr edit "$NEW_PR" --add-label "release" 2>/dev/null || true