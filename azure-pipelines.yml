# ASP.NET Core (.NET Framework)
# Build and test ASP.NET Core projects targeting the full .NET Framework.
# Add steps that publish symbols, save build artifacts, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
  branches:
    include:
      - feature/*
      - develop

pr:
  branches:
    include:
      - develop

pool:
  vmImage: 'windows-latest'

variables:
  solution: '**/*.sln'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'

steps:

- task: SonarCloudPrepare@2
  displayName: Prepare Sonar Cloud
  inputs:
    SonarCloud: 'SonarCloud'
    organization: 'laikha'
    scannerMode: 'MSBuild'
    projectKey: 'laikha_IoC'
    projectName: 'IoC'

- task: NuGetToolInstaller@1

- task: NuGetCommand@2
  displayName: Update Nuget Packages
  inputs:
    restoreSolution: '$(solution)'

- task: VSBuild@1
  displayName: Build Code
  inputs:
    solution: '$(solution)'
    msbuildArgs: '/p:DeployOnBuild=true /p:WebPublishMethod=Package /p:PackageAsSingleFile=true /p:SkipInvalidConfigurations=true /p:DesktopBuildPackageLocation="$(build.artifactStagingDirectory)\WebApp.zip" /p:DeployIisAppPath="Default Web Site"'
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'

- task: VSTest@2
  displayName: Test Fase
  inputs:
    solution: '$(solution)' 
    platform: '$(buildPlatform)'
    configuration: '$(buildConfiguration)'

- task: PowerShell@2
  displayName: 'Criar PR de feature para develop'
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), startsWith(variables['Build.SourceBranch'], 'refs/heads/feature/'))
  inputs:
    targetType: 'inline'
    script: |
      $collectionUri = "$(System.CollectionUri)"
      $project = "$(System.TeamProject)"
      $repoId = "$(Build.Repository.ID)"
      $sourceRef = "$(Build.SourceBranch)"
      $targetRef = "refs/heads/develop"
      $title = "Develop <- Feature"
      $description = "PR gerado automaticamente por pipeline para integrar a branch feature em develop."
      $token = $env:SYSTEM_ACCESSTOKEN
      if (-not $token) {
        throw "SYSTEM_ACCESSTOKEN não está disponível. Ative 'Allow scripts to access OAuth token'."
      }
      $headers = @{ Authorization = "Bearer $token"; Accept = "application/json"; 'Content-Type' = 'application/json' }
      $searchUrl = "$collectionUri$project/_apis/git/repositories/$repoId/pullrequests?searchCriteria.status=active&searchCriteria.sourceRefName=$([uri]::EscapeDataString($sourceRef))&searchCriteria.targetRefName=$([uri]::EscapeDataString($targetRef))&api-version=7.1-preview.1"
      $existing = Invoke-RestMethod -Uri $searchUrl -Headers $headers -UseBasicParsing
      $existingCount = 0
      if ($existing -is [System.Array]) {
        $existingCount = $existing.Count
      } elseif ($existing.value) {
        $existingCount = $existing.value.Count
      } elseif ($existing.count) {
        $existingCount = $existing.count
      }
      if ($existingCount -gt 0) {
        Write-Host "PR já existe entre $sourceRef e $targetRef."
        exit 0
      }
      $body = @{ sourceRefName = $sourceRef; targetRefName = $targetRef; title = $title; description = $description } | ConvertTo-Json -Depth 10
      $createUrl = "$collectionUri$project/_apis/git/repositories/$repoId/pullrequests?api-version=7.1-preview.1"
      $response = Invoke-RestMethod -Method Post -Uri $createUrl -Headers $headers -Body $body -UseBasicParsing
      Write-Host "PR criado: $($response.pullRequestId) - $($response.url)"
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

- task: PowerShell@2
  displayName: 'Criar PR de develop para main'
  condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  inputs:
    targetType: 'inline'
    script: |
      $collectionUri = "$(System.CollectionUri)"
      $project = "$(System.TeamProject)"
      $repoId = "$(Build.Repository.ID)"
      $sourceRef = "refs/heads/develop"
      $targetRef = "refs/heads/main"
      $title = "Main <- Develop"
      $description = "PR gerado automaticamente por pipeline após atualização da branch develop."
      $token = $env:SYSTEM_ACCESSTOKEN
      if (-not $token) {
        throw "SYSTEM_ACCESSTOKEN não está disponível. Ative 'Allow scripts to access OAuth token'."
      }
      $headers = @{ Authorization = "Bearer $token"; Accept = "application/json"; 'Content-Type' = 'application/json' }
      $searchUrl = "$collectionUri$project/_apis/git/repositories/$repoId/pullrequests?searchCriteria.status=active&searchCriteria.sourceRefName=$([uri]::EscapeDataString($sourceRef))&searchCriteria.targetRefName=$([uri]::EscapeDataString($targetRef))&api-version=7.1-preview.1"
      $existing = Invoke-RestMethod -Uri $searchUrl -Headers $headers -UseBasicParsing
      $existingCount = 0
      if ($existing -is [System.Array]) {
        $existingCount = $existing.Count
      } elseif ($existing.value) {
        $existingCount = $existing.value.Count
      } elseif ($existing.count) {
        $existingCount = $existing.count
      }
      if ($existingCount -gt 0) {
        Write-Host "PR já existe entre $sourceRef e $targetRef."
        exit 0
      }
      $body = @{ sourceRefName = $sourceRef; targetRefName = $targetRef; title = $title; description = $description } | ConvertTo-Json -Depth 10
      $createUrl = "$collectionUri$project/_apis/git/repositories/$repoId/pullrequests?api-version=7.1-preview.1"
      $response = Invoke-RestMethod -Method Post -Uri $createUrl -Headers $headers -Body $body -UseBasicParsing
      Write-Host "PR criado: $($response.pullRequestId) - $($response.url)"
  env:
    SYSTEM_ACCESSTOKEN: $(System.AccessToken)

- task: SonarCloudAnalyze@2
  displayName: 'Run Code Analysis'

- task: reportgenerator@5
  displayName: 'OpenCover'
  inputs:
    codeCoverageTool: 'OpenCover'
    reports: '$(Build.SourcesDirectory)\Tests\CodeCoverage.xml'
    targetdir: '$(Build.SourcesDirectory)\Tests\CoverageReport'
    verbosity: 'Verbose'
    title: 'OpenCover'

- task: PublishCodeCoverageResults@1
  displayName: 'Cobertura Report'
  inputs:
    codeCoverageTool: Cobertura
    summaryFileLocation: '$(Build.SourcesDirectory)\Tests\CodeCoverage.xml'
    pathToSources: '$(Build.SourcesDirectory)'
    reportDirectory: '$(Build.SourcesDirectory)\Tests\CoverageReport'
    title: 'Cobertura Report'


- task: SonarCloudPublish@2
  displayName: Publish Sonar
  inputs:
    pollingTimeoutSec: '300'